version: 2

sources:
  - name: public
    schema: "{{ env_var('SUPABASE_DB_SCHEMA', 'public') }}"
    tables:
      - name: raw_tools

models:
  - name: stg_tools
    description: "Staging model for raw ingested tools records."
    columns:
      - name: tool_id
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["product_hunt", "hackernews", "github"]

  - name: int_tools_clean
    description: >
      Deduplicated tools with momentum labels plus heuristic enrichment: pull timestamp,
      data vs non-data, and practice-area bucket (keyword-based; tune patterns over time).
    columns:
      - name: tool_id
        tests:
          - not_null
      - name: data_pulled_at
        tests:
          - not_null
      - name: data_pulled_date
        tests:
          - not_null
      - name: tool_domain
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["data_tool", "non_data_tool"]
      - name: momentum_label
        tests:
          - accepted_values:
              arguments:
                values: ["hot", "rising", "new"]

  - name: fct_trending_tools
    description: "Daily source-level trend aggregates."
    columns:
      - name: source
        tests:
          - not_null

  - name: fct_tool_intel_daily
    description: "Daily counts by pull date, data vs non-data, and practice category."
    columns:
      - name: pull_date
        tests:
          - not_null
      - name: tool_domain
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["data_tool", "non_data_tool"]
