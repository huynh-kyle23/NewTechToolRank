x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: newtechtoolrank-airflow:2.9.1
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    PYTHONPATH: /opt/project
  volumes:
    - ./dags:/opt/airflow/dags
    - ../ingestion:/opt/project/ingestion
    - ../dbt:/opt/project/dbt
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "pip install --no-cache-dir -r /requirements.txt && airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  webserver:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "pip install --no-cache-dir -r /requirements.txt && airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  scheduler:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "pip install --no-cache-dir -r /requirements.txt && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_postgres_data:
